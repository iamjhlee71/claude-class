<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비만도(BMI) 측정기 - 2주차</title>
  <!-- Tailwind CSS (스타일링을 위한 라이브러리) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 본체 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <!-- React를 화면(DOM)에 그려주는 라이브러리 -->
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- JSX 문법을 브라우저가 이해하도록 변환해주는 도구 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-sky-100 to-indigo-100 min-h-screen flex items-center justify-center p-4">
  <!-- React 앱이 그려질 자리 -->
  <div id="root"></div>

  <!-- type="text/babel" 을 적어야 JSX 문법을 사용할 수 있어요 -->
  <script type="text/babel">

    // React에서 자주 쓰는 기능(Hook)을 꺼내옵니다.
    const { useState } = React;

    // ========================================
    // 📊 비만도 분류 기준 (한국/아시아 기준)
    // ========================================
    // BMI 값에 따라 분류 이름과 색상을 정해둡니다.
    // bar : 게이지 바의 색,  text : 글자 색,  bg : 결과 카드 배경색
    const CATEGORIES = [
      { label: "저체중",       min: 0,    max: 18.5, bar: "bg-blue-500",   text: "text-blue-600",   bg: "bg-blue-50",   ring: "ring-blue-200" },
      { label: "정상",         min: 18.5, max: 23,   bar: "bg-emerald-500", text: "text-emerald-600", bg: "bg-emerald-50", ring: "ring-emerald-200" },
      { label: "과체중",       min: 23,   max: 25,   bar: "bg-yellow-500",  text: "text-yellow-600",  bg: "bg-yellow-50",  ring: "ring-yellow-200" },
      { label: "비만 (1단계)", min: 25,   max: 30,   bar: "bg-orange-500",  text: "text-orange-600",  bg: "bg-orange-50",  ring: "ring-orange-200" },
      { label: "고도비만",     min: 30,   max: 999,  bar: "bg-red-500",     text: "text-red-600",     bg: "bg-red-50",     ring: "ring-red-200" },
    ];

    // BMI 숫자를 받아서 해당하는 분류 정보를 찾아 돌려주는 함수예요.
    function getCategory(bmi) {
      return CATEGORIES.find((c) => bmi >= c.min && bmi < c.max) || CATEGORIES[CATEGORIES.length - 1];
    }

    // 게이지 바에서 현재 BMI 위치를 % 로 계산해요. (10 ~ 40 구간을 0~100%로 변환)
    function bmiToPercent(bmi) {
      const min = 10, max = 40;
      const clamped = Math.min(Math.max(bmi, min), max); // 범위를 벗어나면 끝으로 고정
      return ((clamped - min) / (max - min)) * 100;
    }

    // ========================================
    // 📏 게이지 바 컴포넌트 (결과를 시각적으로 표시)
    // ========================================
    function GaugeBar({ bmi }) {
      const percent = bmiToPercent(bmi);

      return (
        <div className="mt-5">
          {/* 5단계 색상이 이어진 가로 막대 */}
          <div className="relative h-4 rounded-full overflow-hidden flex">
            <div className="bg-blue-500"    style={{ width: "20%" }}></div>
            <div className="bg-emerald-500" style={{ width: "20%" }}></div>
            <div className="bg-yellow-500"  style={{ width: "20%" }}></div>
            <div className="bg-orange-500"  style={{ width: "20%" }}></div>
            <div className="bg-red-500"     style={{ width: "20%" }}></div>

            {/* 현재 내 BMI 위치를 가리키는 표시 (검은 막대) */}
            <div
              className="absolute top-[-4px] w-1 h-6 bg-gray-800 rounded-full transition-all duration-500"
              style={{ left: `calc(${percent}% - 2px)` }}
            ></div>
          </div>

          {/* 구간 숫자 안내 */}
          <div className="flex justify-between text-[11px] text-gray-400 mt-1 px-0.5">
            <span>10</span><span>18.5</span><span>23</span><span>25</span><span>30</span><span>40</span>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧮 BMI 측정기 컴포넌트 (메인 기능)
    // ========================================
    function BmiCalculator() {
      const [height, setHeight] = useState(""); // 키 (cm)
      const [weight, setWeight] = useState(""); // 몸무게 (kg)
      const [result, setResult] = useState(null); // 계산 결과 (BMI 숫자)
      const [error, setError] = useState("");      // 오류 메시지

      // "측정하기" 버튼을 눌렀을 때 실행되는 함수
      function handleCalculate() {
        const h = parseFloat(height);
        const w = parseFloat(weight);

        // --- 입력값 유효성 검사 ---
        if (height.trim() === "" || weight.trim() === "") {
          setError("키와 몸무게를 모두 입력해 주세요.");
          setResult(null);
          return;
        }
        if (isNaN(h) || isNaN(w)) {
          setError("숫자만 입력할 수 있어요.");
          setResult(null);
          return;
        }
        if (h <= 0 || w <= 0) {
          setError("키와 몸무게는 0보다 커야 해요.");
          setResult(null);
          return;
        }
        if (h < 50 || h > 250) {
          setError("키는 50cm ~ 250cm 사이로 입력해 주세요.");
          setResult(null);
          return;
        }
        if (w < 10 || w > 300) {
          setError("몸무게는 10kg ~ 300kg 사이로 입력해 주세요.");
          setResult(null);
          return;
        }

        // --- BMI 계산: 몸무게(kg) / (키(m))^2 ---
        const meter = h / 100;
        const bmi = w / (meter * meter);

        setError("");
        setResult(Math.round(bmi * 10) / 10); // 소수점 첫째 자리까지
      }

      // "초기화" 버튼
      function handleReset() {
        setHeight("");
        setWeight("");
        setResult(null);
        setError("");
      }

      // 결과가 있으면 해당하는 분류 정보를 가져옵니다.
      const category = result !== null ? getCategory(result) : null;

      return (
        <div className="bg-white rounded-2xl shadow-lg p-6">
          {/* ---------- 입력 영역 ---------- */}
          <div className="space-y-4">
            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-1">키 (cm)</label>
              <input
                type="number"
                value={height}
                onChange={(e) => setHeight(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleCalculate()}
                placeholder="예) 170"
                className="w-full px-4 py-2.5 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-indigo-400"
              />
            </div>

            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-1">몸무게 (kg)</label>
              <input
                type="number"
                value={weight}
                onChange={(e) => setWeight(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleCalculate()}
                placeholder="예) 65"
                className="w-full px-4 py-2.5 border border-gray-300 rounded-lg
                           focus:outline-none focus:ring-2 focus:ring-indigo-400"
              />
            </div>
          </div>

          {/* ---------- 버튼 영역 ---------- */}
          <div className="flex gap-3 mt-5">
            <button
              onClick={handleCalculate}
              className="flex-1 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition">
              측정하기
            </button>
            <button
              onClick={handleReset}
              className="px-5 py-2.5 bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold rounded-lg transition">
              초기화
            </button>
          </div>

          {/* ---------- 오류 메시지 (조건부 렌더링) ---------- */}
          {error && (
            <p className="mt-4 text-center text-sm text-red-500 bg-red-50 rounded-lg py-2 px-3">
              ⚠️ {error}
            </p>
          )}

          {/* ---------- 결과 영역 (결과가 있을 때만 보임) ---------- */}
          {result !== null && category && (
            <div className={`mt-6 rounded-2xl p-5 text-center ring-1 ${category.bg} ${category.ring}`}>
              <p className="text-sm text-gray-500 mb-1">나의 BMI 지수</p>
              <p className={`text-5xl font-extrabold mb-2 ${category.text}`}>{result}</p>
              <span className={`inline-block px-4 py-1 rounded-full text-white text-sm font-bold ${category.bar}`}>
                {category.label}
              </span>

              {/* 시각적 게이지 바 */}
              <GaugeBar bmi={result} />
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 📋 기준 안내 컴포넌트 (분류표)
    // ========================================
    function CriteriaTable() {
      // 표에 보여줄 분류별 BMI 범위 안내
      const rows = [
        { label: "저체중",       range: "18.5 미만",     bar: "bg-blue-500" },
        { label: "정상",         range: "18.5 ~ 22.9",   bar: "bg-emerald-500" },
        { label: "과체중",       range: "23 ~ 24.9",     bar: "bg-yellow-500" },
        { label: "비만 (1단계)", range: "25 ~ 29.9",     bar: "bg-orange-500" },
        { label: "고도비만",     range: "30 이상",       bar: "bg-red-500" },
      ];

      return (
        <div className="bg-white rounded-2xl shadow p-5 mt-6">
          <h2 className="text-base font-bold text-gray-800 mb-3">📋 비만도 분류 기준 (한국/아시아)</h2>
          <ul className="space-y-2">
            {rows.map((r) => (
              <li key={r.label} className="flex items-center justify-between text-sm">
                <span className="flex items-center gap-2 text-gray-700">
                  <span className={`w-3 h-3 rounded-full ${r.bar}`}></span>
                  {r.label}
                </span>
                <span className="text-gray-500 font-medium">{r.range}</span>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ========================================
    // 🚀 전체 앱 (여러 컴포넌트를 합치기)
    // ========================================
    function App() {
      return (
        <div className="w-full max-w-md">
          <h1 className="text-3xl font-extrabold text-center text-gray-800 mb-2">
            비만도(BMI) 측정기
          </h1>
          <p className="text-center text-gray-500 mb-8">2주차 · 키와 몸무게로 BMI 계산하기</p>

          {/* 컴포넌트를 태그처럼 사용할 수 있어요 */}
          <BmiCalculator />
          <CriteriaTable />

          <p className="text-center text-xs text-gray-400 mt-6">
            ※ 이 결과는 참고용이며 정확한 진단은 의료 전문가와 상담하세요.
          </p>
        </div>
      );
    }

    // ========================================
    // 화면에 App 그리기 (React 18 방식)
    // ========================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
</html>
