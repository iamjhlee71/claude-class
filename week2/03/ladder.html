<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🪜 사다리 타기 게임</title>

  <!-- Tailwind CSS (스타일링을 위한 라이브러리) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>

  <!-- React 본체 (버전을 정확히 고정해 두면 나중에도 똑같이 동작해요) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <!-- React를 화면(DOM)에 그려주는 라이브러리 -->
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <!-- JSX 문법을 브라우저가 이해하도록 변환해주는 도구 (반드시 7.x 버전) -->
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>

  <style>
    /* 사다리 경로가 그려질 때 선이 스르륵 나타나는 애니메이션이에요. */
    @keyframes drawPath {
      from { stroke-dashoffset: var(--len); }
      to   { stroke-dashoffset: 0; }
    }
    .path-anim {
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      animation: drawPath 0.9s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-100 to-indigo-100 min-h-screen flex items-start justify-center p-4">
  <!-- React 앱이 그려질 자리 -->
  <div id="root"></div>

  <!-- type="text/babel" 을 적어야 JSX 문법을 사용할 수 있어요 -->
  <script type="text/babel">

    // React에서 자주 쓰는 기능(Hook)을 꺼내옵니다.
    const { useState, useMemo } = React;

    // ========================================
    // ⚙️ 게임에서 쓰는 기본 설정값
    // ========================================
    const MIN_PLAYERS = 2;   // 최소 참가자 수
    const MAX_PLAYERS = 8;   // 최대 참가자 수
    const ROWS = 10;         // 사다리의 가로줄(발판)이 들어갈 수 있는 층의 개수

    // 참가자(세로줄) 사이의 가로 간격(픽셀)
    const COL_GAP = 90;
    // 사다리 위/아래 여백
    const TOP_PAD = 16;
    const BOTTOM_PAD = 16;
    // 한 층(row)의 높이
    const ROW_H = 34;

    // 참가자마다 다른 색을 칠해주려고 미리 색을 준비해 둡니다.
    const COLORS = [
      "#ef4444", "#f59e0b", "#10b981", "#3b82f6",
      "#8b5cf6", "#ec4899", "#14b8a6", "#f97316",
    ];

    // ========================================
    // 🪜 사다리(가로줄) 무작위로 만들기
    // ----------------------------------------
    // rungs[row][col] = true  ->  row 층에서 col번째 세로줄과
    //                              (col+1)번째 세로줄 사이에 가로줄이 있다는 뜻!
    //
    // 규칙: 한 칸에 가로줄을 놓을 때, 바로 옆 칸(col-1)에 이미 가로줄이 있으면
    //       놓지 않습니다. (가로줄이 서로 붙으면 어디로 가야 할지 헷갈리기 때문)
    // ========================================
    function makeRungs(playerCount) {
      const rungs = [];
      for (let r = 0; r < ROWS; r++) {
        const rowLine = new Array(playerCount - 1).fill(false);
        for (let c = 0; c < playerCount - 1; c++) {
          // 왼쪽 칸에 이미 가로줄이 있으면 건너뛰어요 (붙는 것 방지)
          if (c > 0 && rowLine[c - 1]) continue;
          // 약 40% 확률로 가로줄을 놓습니다.
          if (Math.random() < 0.4) rowLine[c] = true;
        }
        rungs.push(rowLine);
      }
      return rungs;
    }

    // ========================================
    // 🧭 한 명이 위에서 아래로 내려가는 길 따라가기
    // ----------------------------------------
    // startCol 번째 세로줄에서 출발해서, 각 층마다
    //  - 오른쪽에 가로줄이 있으면 오른쪽으로 한 칸 이동
    //  - 아니면 왼쪽에 가로줄이 있으면 왼쪽으로 한 칸 이동
    //  - 둘 다 없으면 그대로 아래로
    // 이렇게 끝까지 내려가면 도착하는 칸(col)을 돌려줍니다.
    //
    // 화면에 선을 그리기 위해, 지나온 좌표(점들)도 함께 모아서 반환해요.
    // ========================================
    function tracePath(rungs, startCol, playerCount) {
      let col = startCol;
      // 점(point)들을 모읍니다. 첫 점은 맨 위 출발 지점.
      const points = [{ x: colX(col), y: TOP_PAD }];

      for (let r = 0; r < ROWS; r++) {
        const yTop = TOP_PAD + r * ROW_H;          // 이 층의 시작 높이
        const yBottom = TOP_PAD + (r + 1) * ROW_H; // 이 층의 끝 높이

        // 오른쪽으로 건너갈 가로줄이 있는지 확인
        if (col < playerCount - 1 && rungs[r][col]) {
          // 가로줄 높이까지 내려온 뒤 오른쪽으로 이동
          points.push({ x: colX(col), y: yBottom });
          col = col + 1;
          points.push({ x: colX(col), y: yBottom });
        }
        // 왼쪽으로 건너갈 가로줄이 있는지 확인
        else if (col > 0 && rungs[r][col - 1]) {
          points.push({ x: colX(col), y: yBottom });
          col = col - 1;
          points.push({ x: colX(col), y: yBottom });
        }
        // 가로줄이 없으면 그냥 아래로
        else {
          points.push({ x: colX(col), y: yBottom });
        }
      }

      return { endCol: col, points };
    }

    // col번째 세로줄의 x좌표(픽셀)를 계산해주는 도우미 함수
    function colX(col) {
      return COL_GAP / 2 + col * COL_GAP;
    }

    // ========================================
    // 🎛️ 인원수 조절 컴포넌트 ( - 숫자 + )
    // ========================================
    function PlayerCounter({ count, onChange, disabled }) {
      return (
        <div className="flex items-center justify-center gap-3 mb-4">
          <span className="text-gray-700 font-semibold">참가 인원</span>
          <button
            onClick={() => onChange(count - 1)}
            disabled={disabled || count <= MIN_PLAYERS}
            className="w-9 h-9 rounded-full bg-rose-500 hover:bg-rose-600 text-white text-xl
                       font-bold disabled:opacity-40 disabled:cursor-not-allowed transition">
            −
          </button>
          <span className="w-10 text-center text-2xl font-extrabold text-indigo-600">{count}</span>
          <button
            onClick={() => onChange(count + 1)}
            disabled={disabled || count >= MAX_PLAYERS}
            className="w-9 h-9 rounded-full bg-emerald-500 hover:bg-emerald-600 text-white text-xl
                       font-bold disabled:opacity-40 disabled:cursor-not-allowed transition">
            +
          </button>
        </div>
      );
    }

    // ========================================
    // 🖼️ 사다리 그림(SVG) 컴포넌트
    // ----------------------------------------
    // 세로줄, 가로줄, 그리고 선택된 참가자의 경로를 그려줍니다.
    // ========================================
    function LadderBoard({ playerCount, rungs, highlightPath, highlightColor }) {
      const width = COL_GAP * playerCount;                 // 전체 가로 크기
      const height = TOP_PAD + ROWS * ROW_H + BOTTOM_PAD;  // 전체 세로 크기

      // 경로(points)를 SVG가 이해하는 문자열 "x1,y1 x2,y2 ..." 로 바꿔줍니다.
      const pathStr = highlightPath
        ? highlightPath.map((p) => `${p.x},${p.y}`).join(" ")
        : null;

      // 선이 그려지는 애니메이션 길이를 대략 계산 (점 사이 거리의 합)
      const pathLen = useMemo(() => {
        if (!highlightPath) return 0;
        let len = 0;
        for (let i = 1; i < highlightPath.length; i++) {
          const dx = highlightPath[i].x - highlightPath[i - 1].x;
          const dy = highlightPath[i].y - highlightPath[i - 1].y;
          len += Math.sqrt(dx * dx + dy * dy);
        }
        return len;
      }, [highlightPath]);

      return (
        <svg
          width="100%"
          viewBox={`0 0 ${width} ${height}`}
          className="mx-auto block"
          style={{ maxWidth: width }}>

          {/* 세로줄 그리기 */}
          {Array.from({ length: playerCount }).map((_, c) => (
            <line
              key={"v" + c}
              x1={colX(c)} y1={TOP_PAD}
              x2={colX(c)} y2={height - BOTTOM_PAD}
              stroke="#cbd5e1" strokeWidth="4" strokeLinecap="round"
            />
          ))}

          {/* 가로줄(발판) 그리기 */}
          {rungs.map((row, r) =>
            row.map((has, c) =>
              has ? (
                <line
                  key={"h" + r + "-" + c}
                  x1={colX(c)} y1={TOP_PAD + (r + 1) * ROW_H}
                  x2={colX(c + 1)} y2={TOP_PAD + (r + 1) * ROW_H}
                  stroke="#94a3b8" strokeWidth="4" strokeLinecap="round"
                />
              ) : null
            )
          )}

          {/* 선택된 참가자의 경로(있을 때만) 색칠해서 보여주기 */}
          {pathStr && (
            <polyline
              points={pathStr}
              fill="none"
              stroke={highlightColor}
              strokeWidth="5"
              strokeLinecap="round"
              strokeLinejoin="round"
              className="path-anim"
              style={{ "--len": pathLen }}
            />
          )}
        </svg>
      );
    }

    // ========================================
    // 🚀 전체 사다리 타기 게임 앱
    // ========================================
    function App() {
      const [playerCount, setPlayerCount] = useState(4);          // 참가 인원
      const [names, setNames] = useState(["", "", "", ""]);        // 위쪽 이름들
      const [results, setResults] = useState(["꽝", "당첨", "꽝", "커피사기"]); // 아래쪽 결과들
      const [rungs, setRungs] = useState(() => makeRungs(4));      // 사다리 가로줄
      const [revealed, setRevealed] = useState(false);             // 결과를 봤는지 여부
      const [selected, setSelected] = useState(null);              // 강조해서 볼 참가자 번호

      // 인원수가 바뀌면 이름/결과/사다리 길이를 거기에 맞춰 다시 맞춰줍니다.
      function changeCount(next) {
        if (next < MIN_PLAYERS || next > MAX_PLAYERS) return;
        setPlayerCount(next);
        setNames((prev) => adjust(prev, next, (i) => ""));
        setResults((prev) => adjust(prev, next, (i) => "꽝"));
        setRungs(makeRungs(next));
        setRevealed(false);
        setSelected(null);
      }

      // 배열 길이를 len에 맞춰 늘리거나 줄여주는 도우미 함수
      function adjust(arr, len, fillFn) {
        const copy = arr.slice(0, len);
        while (copy.length < len) copy.push(fillFn(copy.length));
        return copy;
      }

      // 사다리 새로 만들기 (섞기)
      function shuffle() {
        setRungs(makeRungs(playerCount));
        setRevealed(false);
        setSelected(null);
      }

      // 결과 보기 (사다리를 따라 내려가 누가 어디에 도착하는지 계산)
      function showResult() {
        setRevealed(true);
        setSelected(null);
      }

      // 처음부터 다시 (이름/결과는 비우고 새 사다리)
      function reset() {
        setNames(new Array(playerCount).fill(""));
        setResults(new Array(playerCount).fill("꽝"));
        setRungs(makeRungs(playerCount));
        setRevealed(false);
        setSelected(null);
      }

      // 모든 참가자의 도착 칸을 한 번에 계산해 둡니다. (rungs/인원이 바뀔 때만 다시 계산)
      const traces = useMemo(() => {
        return Array.from({ length: playerCount }).map((_, i) =>
          tracePath(rungs, i, playerCount)
        );
      }, [rungs, playerCount]);

      // 화면에 강조해서 보여줄 경로 (참가자를 클릭했을 때만)
      const highlight = selected !== null ? traces[selected] : null;

      // 이름이 비었을 때 보여줄 기본 표시 (참가자1, 참가자2 ...)
      const labelOf = (i) => names[i].trim() || `참가자${i + 1}`;

      return (
        <div className="w-full max-w-3xl">
          <h1 className="text-3xl font-extrabold text-center text-gray-800 mb-1">
            🪜 사다리 타기 게임
          </h1>
          <p className="text-center text-gray-500 mb-6">
            이름과 결과를 적고, 사다리를 타고 내려가 보세요!
          </p>

          {/* 인원수 조절 */}
          <PlayerCounter count={playerCount} onChange={changeCount} />

          {/* 조작 버튼들 */}
          <div className="flex flex-wrap justify-center gap-2 mb-6">
            <button
              onClick={shuffle}
              className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-lg transition">
              🔀 사다리 생성
            </button>
            <button
              onClick={showResult}
              className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition">
              ▶️ 결과 보기
            </button>
            <button
              onClick={reset}
              className="px-4 py-2 bg-gray-400 hover:bg-gray-500 text-white font-semibold rounded-lg transition">
              ↺ 다시하기
            </button>
          </div>

          {/* 사다리 + 입력칸을 담는 흰색 카드 */}
          <div className="bg-white rounded-2xl shadow-lg p-4 sm:p-6 overflow-x-auto">

            {/* 위쪽: 이름 입력칸 */}
            <div
              className="grid mb-2"
              style={{ gridTemplateColumns: `repeat(${playerCount}, minmax(0, 1fr))`, minWidth: COL_GAP * playerCount }}>
              {names.map((name, i) => (
                <div key={"name" + i} className="px-1">
                  <input
                    value={name}
                    onChange={(e) => {
                      const copy = [...names];
                      copy[i] = e.target.value;
                      setNames(copy);
                    }}
                    placeholder={`참가자${i + 1}`}
                    className="w-full text-center text-sm font-semibold px-1 py-2 rounded-lg
                               border-2 transition focus:outline-none focus:ring-2 focus:ring-indigo-300"
                    style={{
                      borderColor: selected === i ? COLORS[i % COLORS.length] : "#e5e7eb",
                    }}
                  />
                </div>
              ))}
            </div>

            {/* 가운데: 사다리 그림 */}
            <LadderBoard
              playerCount={playerCount}
              rungs={rungs}
              highlightPath={highlight ? highlight.points : null}
              highlightColor={selected !== null ? COLORS[selected % COLORS.length] : "#000"}
            />

            {/* 아래쪽: 결과 입력칸 */}
            <div
              className="grid mt-2"
              style={{ gridTemplateColumns: `repeat(${playerCount}, minmax(0, 1fr))`, minWidth: COL_GAP * playerCount }}>
              {results.map((res, i) => (
                <div key={"res" + i} className="px-1">
                  <input
                    value={res}
                    onChange={(e) => {
                      const copy = [...results];
                      copy[i] = e.target.value;
                      setResults(copy);
                    }}
                    placeholder="결과"
                    className="w-full text-center text-sm font-semibold px-1 py-2 rounded-lg
                               border-2 border-gray-200 bg-gray-50 transition
                               focus:outline-none focus:ring-2 focus:ring-indigo-300"
                  />
                </div>
              ))}
            </div>
          </div>

          {/* 결과 보기를 누른 뒤에만 나타나는 결과 요약 */}
          {revealed && (
            <div className="bg-white rounded-2xl shadow-lg p-5 mt-6">
              <h2 className="text-xl font-bold text-gray-800 mb-1">🎉 결과 발표</h2>
              <p className="text-sm text-gray-500 mb-4">
                이름을 클릭하면 그 사람이 내려간 길을 색깔로 보여줘요!
              </p>

              <ul className="space-y-2">
                {traces.map((t, i) => {
                  const color = COLORS[i % COLORS.length];
                  const isOn = selected === i;
                  return (
                    <li key={"sum" + i}>
                      <button
                        onClick={() => setSelected(isOn ? null : i)}
                        className={
                          "w-full flex items-center justify-between gap-3 px-4 py-2 rounded-xl border-2 transition " +
                          (isOn ? "shadow-md" : "hover:bg-gray-50")
                        }
                        style={{
                          borderColor: isOn ? color : "#e5e7eb",
                          backgroundColor: isOn ? color + "1a" : "white", // 1a = 살짝 투명한 배경
                        }}>
                        <span className="flex items-center gap-2 font-semibold text-gray-800">
                          <span
                            className="inline-block w-3 h-3 rounded-full"
                            style={{ backgroundColor: color }}
                          />
                          {labelOf(i)}
                        </span>
                        <span className="text-gray-400">➜</span>
                        <span className="font-bold text-indigo-600">
                          {results[t.endCol].trim() || "(결과 없음)"}
                        </span>
                      </button>
                    </li>
                  );
                })}
              </ul>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 화면에 App 그리기 (React 18 방식)
    // ========================================
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);

  </script>
</body>
</html>
