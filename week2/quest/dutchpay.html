<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>더치페이 계산기 · N빵</title>
  <!-- ⚠️ 모든 CDN은 버전 고정. Babel 은 반드시 7.x (8.x 미지원) -->
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.9/babel.min.js"></script>
  <style>
    /* Tailwind 으로 처리 불가능한 부분만 */
    @keyframes pop {
      0% { transform: scale(0.96); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop 0.25s ease-out; }
    /* number input 의 spinner 제거 (모바일 깔끔하게) */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-orange-50">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo, useCallback } = React;

    // ========================================
    // 유틸리티 (포맷팅)
    // ========================================
    const formatWon = (n) => {
      if (n === '' || n === null || n === undefined || isNaN(n)) return '0';
      return Math.round(Number(n)).toLocaleString('ko-KR');
    };
    // 콤마 포함 문자열 -> 숫자
    const parseNumber = (str) => {
      const cleaned = String(str).replace(/[^0-9]/g, '');
      return cleaned === '' ? 0 : Number(cleaned);
    };

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-3xl shadow-lg shadow-orange-100/60 p-5 sm:p-6 ${className}`}>
          {children}
        </div>
      );
    }

    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '', ...props }) {
      const base = 'inline-flex items-center justify-center font-bold rounded-2xl transition-all active:scale-95 focus:outline-none focus:ring-4 disabled:opacity-40 disabled:active:scale-100 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-orange-500 text-white hover:bg-orange-600 focus:ring-orange-200 shadow-md shadow-orange-200',
        secondary: 'bg-orange-100 text-orange-700 hover:bg-orange-200 focus:ring-orange-100',
        ghost: 'bg-transparent text-orange-600 hover:bg-orange-50 focus:ring-orange-100',
        danger: 'bg-rose-100 text-rose-600 hover:bg-rose-200 focus:ring-rose-100',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-4 py-2.5 text-base',
        lg: 'px-5 py-3.5 text-lg',
        icon: 'w-11 h-11 text-xl',
      };
      return (
        <button
          type="button"
          disabled={disabled}
          onClick={onClick}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function MoneyInput({ label, value, onChange, placeholder = '0', suffix = '원', className = '' }) {
      return (
        <div className={className}>
          {label && <label className="block text-sm font-semibold text-stone-600 mb-1.5">{label}</label>}
          <div className="relative">
            <input
              type="text"
              inputMode="numeric"
              value={value === 0 ? '' : formatWon(value)}
              onChange={(e) => onChange(parseNumber(e.target.value))}
              placeholder={placeholder}
              className="w-full text-right text-2xl font-bold text-stone-800 bg-orange-50/70 border-2 border-transparent focus:border-orange-300 focus:bg-white rounded-2xl py-3 pl-4 pr-12 outline-none transition-colors"
            />
            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-lg font-semibold text-stone-400 pointer-events-none">{suffix}</span>
          </div>
        </div>
      );
    }

    function Stepper({ value, onChange, min = 1, max = 99, label }) {
      const dec = () => onChange(Math.max(min, value - 1));
      const inc = () => onChange(Math.min(max, value + 1));
      const handleInput = (e) => {
        const n = parseNumber(e.target.value);
        onChange(Math.min(max, Math.max(0, n)));
      };
      return (
        <div>
          {label && <label className="block text-sm font-semibold text-stone-600 mb-1.5">{label}</label>}
          <div className="flex items-center gap-3">
            <Button size="icon" variant="secondary" onClick={dec} disabled={value <= min} aria-label="인원 감소">−</Button>
            <div className="relative flex-1">
              <input
                type="text"
                inputMode="numeric"
                value={value}
                onChange={handleInput}
                onBlur={() => { if (value < min) onChange(min); }}
                className="w-full text-center text-2xl font-bold text-stone-800 bg-orange-50/70 border-2 border-transparent focus:border-orange-300 focus:bg-white rounded-2xl py-3 pr-8 pl-2 outline-none transition-colors"
                aria-label="인원 수"
              />
              <span className="absolute right-4 top-1/2 -translate-y-1/2 text-lg font-semibold text-stone-400 pointer-events-none">명</span>
            </div>
            <Button size="icon" variant="secondary" onClick={inc} disabled={value >= max} aria-label="인원 증가">＋</Button>
          </div>
        </div>
      );
    }

    function Toggle({ checked, onChange, label, desc }) {
      return (
        <button
          type="button"
          onClick={() => onChange(!checked)}
          className="w-full flex items-center justify-between gap-3 text-left"
          aria-pressed={checked}
        >
          <div>
            <div className="font-bold text-stone-700">{label}</div>
            {desc && <div className="text-xs text-stone-400 mt-0.5">{desc}</div>}
          </div>
          <span className={`relative inline-flex h-7 w-12 shrink-0 rounded-full transition-colors ${checked ? 'bg-orange-500' : 'bg-stone-300'}`}>
            <span className={`absolute top-1 left-1 h-5 w-5 rounded-full bg-white shadow transition-transform ${checked ? 'translate-x-5' : ''}`} />
          </span>
        </button>
      );
    }

    function SegmentedTabs({ tabs, active, onChange }) {
      return (
        <div className="flex bg-orange-100/70 rounded-2xl p-1 gap-1">
          {tabs.map((t) => (
            <button
              key={t.value}
              type="button"
              onClick={() => onChange(t.value)}
              className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${
                active === t.value ? 'bg-white text-orange-600 shadow' : 'text-stone-500 hover:text-stone-700'
              }`}
            >
              {t.label}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 📄 균등 분배 모드 (총액 + 인원 + 팁)
    // ========================================
    function EqualMode() {
      const [total, setTotal] = useState(0);
      const [people, setPeople] = useState(2);
      const [useTip, setUseTip] = useState(false);
      const [tipPercent, setTipPercent] = useState(10);
      const [rounding, setRounding] = useState('up'); // 'up' | 'round' | 'exact'

      const tipPresets = [5, 10, 15, 20];

      const result = useMemo(() => {
        const tipAmount = useTip ? Math.round(total * (tipPercent / 100)) : 0;
        const grandTotal = total + tipAmount;
        const safePeople = people < 1 ? 1 : people;
        const rawShare = grandTotal / safePeople;

        let perPerson;
        if (rounding === 'up') perPerson = Math.ceil(rawShare / 10) * 10;       // 10원 단위 올림
        else if (rounding === 'round') perPerson = Math.round(rawShare / 10) * 10; // 10원 단위 반올림
        else perPerson = Math.round(rawShare);                                   // 1원 단위

        const collected = perPerson * safePeople;
        const diff = collected - grandTotal; // 양수면 더 걷힘(거스름/여유), 음수면 모자람

        return { tipAmount, grandTotal, perPerson, collected, diff, safePeople };
      }, [total, people, useTip, tipPercent, rounding]);

      return (
        <div className="space-y-4">
          {/* 입력 카드 */}
          <Card className="space-y-5">
            <MoneyInput label="총 결제 금액" value={total} onChange={setTotal} />
            <Stepper label="나눌 인원" value={people} onChange={setPeople} min={1} max={99} />

            {/* 빠른 금액 추가 버튼 */}
            <div className="flex flex-wrap gap-2">
              {[10000, 50000, 100000].map((amt) => (
                <Button key={amt} size="sm" variant="secondary" onClick={() => setTotal(total + amt)}>
                  +{formatWon(amt)}
                </Button>
              ))}
              {total > 0 && (
                <Button size="sm" variant="ghost" onClick={() => setTotal(0)}>초기화</Button>
              )}
            </div>
          </Card>

          {/* 팁 옵션 */}
          <Card className="space-y-4">
            <Toggle
              checked={useTip}
              onChange={setUseTip}
              label="팁 / 봉사료 추가"
              desc="총액에 퍼센트로 더해서 계산해요"
            />
            {useTip && (
              <div className="animate-pop space-y-3 pt-1">
                <div className="flex gap-2">
                  {tipPresets.map((p) => (
                    <button
                      key={p}
                      type="button"
                      onClick={() => setTipPercent(p)}
                      className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${
                        tipPercent === p ? 'bg-orange-500 text-white shadow' : 'bg-orange-100 text-orange-600 hover:bg-orange-200'
                      }`}
                    >
                      {p}%
                    </button>
                  ))}
                </div>
                <div className="flex items-center justify-between text-sm">
                  <span className="text-stone-500">팁 금액</span>
                  <span className="font-bold text-stone-700">+{formatWon(result.tipAmount)}원</span>
                </div>
              </div>
            )}
          </Card>

          {/* 반올림 옵션 */}
          <Card>
            <div className="text-sm font-semibold text-stone-600 mb-2">1인당 금액 정산 방식</div>
            <SegmentedTabs
              active={rounding}
              onChange={setRounding}
              tabs={[
                { value: 'up', label: '10원 올림' },
                { value: 'round', label: '10원 반올림' },
                { value: 'exact', label: '1원 단위' },
              ]}
            />
          </Card>

          {/* 결과 강조 카드 */}
          <ResultCard result={result} grandTotal={result.grandTotal} />
        </div>
      );
    }

    function ResultCard({ result, grandTotal }) {
      const { perPerson, collected, diff, safePeople } = result;
      return (
        <div className="animate-pop bg-gradient-to-br from-orange-500 to-rose-500 rounded-3xl shadow-xl shadow-orange-200 p-6 text-white">
          <div className="text-center">
            <div className="text-sm font-semibold text-orange-50/90">1인당 내야 할 금액</div>
            <div className="mt-1 text-5xl font-extrabold tracking-tight">
              {formatWon(perPerson)}<span className="text-2xl font-bold ml-1">원</span>
            </div>
            <div className="mt-1 text-sm text-orange-50/80">{safePeople}명이 나눠서 결제</div>
          </div>

          <div className="mt-5 pt-4 border-t border-white/25 space-y-2 text-sm">
            <Row label="최종 합계" value={`${formatWon(grandTotal)}원`} />
            <Row label={`걷히는 총액 (${formatWon(perPerson)}원 × ${safePeople})`} value={`${formatWon(collected)}원`} />
            {diff !== 0 && (
              <div className="mt-2 bg-white/15 rounded-2xl px-4 py-2.5 text-xs leading-relaxed">
                {diff > 0
                  ? `💡 ${formatWon(diff)}원이 더 걷혀요. 결제자가 ${formatWon(diff)}원을 거슬러 주거나 팁에 보태면 딱 맞아요.`
                  : `💡 ${formatWon(-diff)}원이 모자라요. 한 명이 ${formatWon(-diff)}원을 더 내면 정확히 정산돼요.`}
              </div>
            )}
            {diff === 0 && (
              <div className="mt-2 bg-white/15 rounded-2xl px-4 py-2.5 text-xs">
                ✅ 1원 오차 없이 딱 맞게 정산돼요!
              </div>
            )}
          </div>
        </div>
      );
    }

    function Row({ label, value }) {
      return (
        <div className="flex items-center justify-between">
          <span className="text-orange-50/85">{label}</span>
          <span className="font-bold">{value}</span>
        </div>
      );
    }

    // ========================================
    // 📄 세부 정산 모드 (각자 먹은 금액 다를 때)
    // ========================================
    function DetailMode() {
      const [members, setMembers] = useState([
        { id: 1, name: '', amount: 0 },
        { id: 2, name: '', amount: 0 },
      ]);
      const [useTip, setUseTip] = useState(false);
      const [tipPercent, setTipPercent] = useState(10);
      const nextId = React.useRef(3);

      const addMember = () => {
        setMembers([...members, { id: nextId.current++, name: '', amount: 0 }]);
      };
      const removeMember = (id) => {
        if (members.length <= 1) return;
        setMembers(members.filter((m) => m.id !== id));
      };
      const updateMember = (id, patch) => {
        setMembers(members.map((m) => (m.id === id ? { ...m, ...patch } : m)));
      };

      const subtotal = useMemo(() => members.reduce((s, m) => s + m.amount, 0), [members]);
      const tipRate = useTip ? tipPercent / 100 : 0;
      const grandTotal = Math.round(subtotal * (1 + tipRate));

      return (
        <div className="space-y-4">
          <Card className="space-y-3">
            <div className="flex items-center justify-between">
              <div className="font-bold text-stone-700">각자 먹은 금액 입력</div>
              <span className="text-xs text-stone-400">{members.length}명</span>
            </div>
            <div className="space-y-3">
              {members.map((m, i) => (
                <div key={m.id} className="flex items-center gap-2">
                  <input
                    type="text"
                    value={m.name}
                    onChange={(e) => updateMember(m.id, { name: e.target.value })}
                    placeholder={`사람 ${i + 1}`}
                    className="w-24 shrink-0 text-sm font-semibold text-stone-700 bg-orange-50/70 border-2 border-transparent focus:border-orange-300 focus:bg-white rounded-xl py-2.5 px-3 outline-none transition-colors"
                    aria-label="이름"
                  />
                  <div className="relative flex-1">
                    <input
                      type="text"
                      inputMode="numeric"
                      value={m.amount === 0 ? '' : formatWon(m.amount)}
                      onChange={(e) => updateMember(m.id, { amount: parseNumber(e.target.value) })}
                      placeholder="0"
                      className="w-full text-right font-bold text-stone-800 bg-orange-50/70 border-2 border-transparent focus:border-orange-300 focus:bg-white rounded-xl py-2.5 pl-3 pr-9 outline-none transition-colors"
                      aria-label="금액"
                    />
                    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-stone-400 pointer-events-none">원</span>
                  </div>
                  <button
                    type="button"
                    onClick={() => removeMember(m.id)}
                    disabled={members.length <= 1}
                    className="w-9 h-9 shrink-0 rounded-xl text-stone-400 hover:bg-rose-50 hover:text-rose-500 disabled:opacity-30 transition-colors"
                    aria-label="삭제"
                  >
                    ✕
                  </button>
                </div>
              ))}
            </div>
            <Button variant="secondary" onClick={addMember} className="w-full">＋ 인원 추가</Button>
          </Card>

          <Card>
            <Toggle
              checked={useTip}
              onChange={setUseTip}
              label="팁 / 봉사료 추가"
              desc="각자 금액에 동일 비율로 적용돼요"
            />
            {useTip && (
              <div className="animate-pop flex gap-2 mt-4">
                {[5, 10, 15, 20].map((p) => (
                  <button
                    key={p}
                    type="button"
                    onClick={() => setTipPercent(p)}
                    className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${
                      tipPercent === p ? 'bg-orange-500 text-white shadow' : 'bg-orange-100 text-orange-600 hover:bg-orange-200'
                    }`}
                  >
                    {p}%
                  </button>
                ))}
              </div>
            )}
          </Card>

          {/* 세부 정산 결과 */}
          <div className="animate-pop bg-gradient-to-br from-orange-500 to-rose-500 rounded-3xl shadow-xl shadow-orange-200 p-6 text-white">
            <div className="text-center mb-4">
              <div className="text-sm font-semibold text-orange-50/90">총 합계{useTip ? ` (팁 ${tipPercent}% 포함)` : ''}</div>
              <div className="mt-1 text-4xl font-extrabold">{formatWon(grandTotal)}<span className="text-xl font-bold ml-1">원</span></div>
            </div>
            <div className="space-y-2 pt-4 border-t border-white/25 text-sm">
              {members.every((m) => m.amount === 0) ? (
                <div className="text-center text-orange-50/80 py-2">각자 먹은 금액을 입력해 주세요</div>
              ) : (
                members.map((m, i) => {
                  const pay = Math.round(m.amount * (1 + tipRate));
                  return (
                    <div key={m.id} className="flex items-center justify-between bg-white/15 rounded-2xl px-4 py-2.5">
                      <span className="font-semibold">{m.name.trim() || `사람 ${i + 1}`}</span>
                      <span className="font-bold text-lg">{formatWon(pay)}원</span>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [mode, setMode] = useState('equal');
      return (
        <div className="min-h-screen px-4 py-6 sm:py-10">
          <div className="max-w-md mx-auto">
            {/* 헤더 */}
            <header className="text-center mb-6">
              <div className="text-4xl mb-1">🧮</div>
              <h1 className="text-2xl font-extrabold text-stone-800">더치페이 계산기</h1>
              <p className="text-sm text-stone-500 mt-1">N빵, 깔끔하게 나눠요</p>
            </header>

            {/* 모드 전환 */}
            <div className="mb-4">
              <SegmentedTabs
                active={mode}
                onChange={setMode}
                tabs={[
                  { value: 'equal', label: '💸 똑같이 나누기' },
                  { value: 'detail', label: '🍽️ 각자 정산' },
                ]}
              />
            </div>

            {mode === 'equal' ? <EqualMode /> : <DetailMode />}

            <footer className="text-center text-xs text-stone-400 mt-8">
              따뜻한 식사 후, 부담 없이 나눠요 🧡
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
